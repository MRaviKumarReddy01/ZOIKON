name: Deploy Zoikon Chatbot to GCP Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE: zoikon
  REGION: europe-west1
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/zoikon

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Authenticate with Google Cloud
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 3️⃣ Setup gcloud CLI
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    # 4️⃣ Configure Docker
    - name: Configure Docker
      run: gcloud auth configure-docker gcr.io --quiet

    # 5️⃣ Build Docker image
    - name: Build Docker image
      run: |
        docker build -t $IMAGE:${{ github.sha }} .
        docker tag $IMAGE:${{ github.sha }} $IMAGE:latest

    # 6️⃣ Push Docker image
    - name: Push Docker image
      run: |
        docker push $IMAGE:${{ github.sha }}
        docker push $IMAGE:latest

    # 7️⃣ Deploy to Cloud Run
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE \
          --image $IMAGE:${{ github.sha }} \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --port 8080 \
          --memory 512Mi \
          --cpu 1 \
          --max-instances 3 \
          --timeout 300 \
          --set-env-vars \
          SMTP_HOST=${{ secrets.SMTP_HOST }},\
          SMTP_PORT=${{ secrets.SMTP_PORT }},\
          SMTP_USER=${{ secrets.SMTP_USER }},\
          SMTP_PASS=${{ secrets.SMTP_PASS }},\
          SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}

    # 8️⃣ Get service URL
    - name: Get Service URL
      id: url
      run: |
        SERVICE_URL=$(gcloud run services describe $SERVICE \
          --region $REGION \
          --format='value(status.url)')
        echo "SERVICE_URL=$SERVICE_URL"
        echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT

    # 9️⃣ Test deployment
    - name: Health Check
      run: |
        SERVICE_URL="${{ steps.url.outputs.service_url }}"
        echo "Checking health endpoint..."
        curl -i "$SERVICE_URL/health" || true

    # 🔟 Print result
    - name: Deployment Summary
      run: |
        SERVICE_URL="${{ steps.url.outputs.service_url }}"
        echo ""
        echo "========================================="
        echo "✅ Zoikon Chatbot Deployed Successfully"
        echo "========================================="
        echo "Chat UI:"
        echo "$SERVICE_URL/ui"
        echo ""
        echo "Health:"
        echo "$SERVICE_URL/health"
        echo ""
        echo "Email API:"
        echo "$SERVICE_URL/send-request"
        echo "========================================="