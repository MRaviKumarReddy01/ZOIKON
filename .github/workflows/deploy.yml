name: Zoikon Chatbot CI/CD - GCP Deployment

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE:    zoikon
  REGION:     europe-west1
  IMAGE:      gcr.io/${{ secrets.GCP_PROJECT_ID }}/zoikon

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate with Google Cloud ────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker to use gcloud auth ───────────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      # ── 5. Build the Docker image ────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      # ── 6. Push to Google Container Registry ─────────────────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run with Secrets ──────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --port 8080 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars \
            SMTP_HOST=${{ secrets.SMTP_HOST }},\
            SMTP_PORT=${{ secrets.SMTP_PORT }},\
            SMTP_USER=${{ secrets.SMTP_USER }},\
            SMTP_PASS=${{ secrets.SMTP_PASS }},\
            SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }},\
            USE_GMAIL=${{ secrets.USE_GMAIL }},\
            GMAIL_USER=${{ secrets.GMAIL_USER }},\
            GMAIL_PASS=${{ secrets.GMAIL_PASS }} \
            --quiet

      # ── 8. Print deployed URL ─────────────────────────────────────────────────
      - name: Show deployed URL
        run: |
          echo "✅ Deployment successful!"
          gcloud run services describe ${{ env.SERVICE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'

      # ── 9. Run health check ──────────────────────────────────────────────────
      - name: Health check
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "🏥 Checking health at: $SERVICE_URL/health"
          curl -s "$SERVICE_URL/health" | jq .