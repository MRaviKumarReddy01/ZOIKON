#!/bin/bash
# ══════════════════════════════════════════════════════════════
#  Run this in GCP Cloud Shell to fix the permissions error
#  "artifactregistry.repositories.uploadArtifacts denied"
# ══════════════════════════════════════════════════════════════

# ── STEP 1: Set your project ID ───────────────────────────────
PROJECT_ID=$(gcloud config get-value project)
echo "Project: $PROJECT_ID"

# ── STEP 2: Find the service account being used ───────────────
SA_EMAIL="github-cicd@${PROJECT_ID}.iam.gserviceaccount.com"
echo "Service Account: $SA_EMAIL"

# ── STEP 3: Enable required GCP APIs ─────────────────────────
gcloud services enable artifactregistry.googleapis.com --project=$PROJECT_ID
gcloud services enable containerregistry.googleapis.com --project=$PROJECT_ID
gcloud services enable run.googleapis.com --project=$PROJECT_ID
echo "✅ APIs enabled"

# ── STEP 4: Grant ALL required roles ──────────────────────────

# For pushing to GCR (gcr.io)
gcloud projects add-iam-policy-binding $PROJECT_ID \
  --member="serviceAccount:${SA_EMAIL}" \
  --role="roles/storage.admin"

# For pushing to Artifact Registry (newer GCP)
gcloud projects add-iam-policy-binding $PROJECT_ID \
  --member="serviceAccount:${SA_EMAIL}" \
  --role="roles/artifactregistry.writer"

# For deploying to Cloud Run
gcloud projects add-iam-policy-binding $PROJECT_ID \
  --member="serviceAccount:${SA_EMAIL}" \
  --role="roles/run.admin"

# For acting as a service account during deploy
gcloud projects add-iam-policy-binding $PROJECT_ID \
  --member="serviceAccount:${SA_EMAIL}" \
  --role="roles/iam.serviceAccountUser"

# For reading/writing container images
gcloud projects add-iam-policy-binding $PROJECT_ID \
  --member="serviceAccount:${SA_EMAIL}" \
  --role="roles/storage.objectAdmin"

echo ""
echo "✅ All roles granted to: $SA_EMAIL"
echo ""

# ── STEP 5: Create/update GCR bucket permissions ──────────────
# GCR stores images in a GCS bucket — SA needs access to it
GCR_BUCKET="artifacts.${PROJECT_ID}.appspot.com"
gsutil iam ch serviceAccount:${SA_EMAIL}:objectAdmin gs://${GCR_BUCKET} 2>/dev/null \
  && echo "✅ GCR bucket permissions set" \
  || echo "⚠️  GCR bucket not found yet — it will be created on first push"

echo ""
echo "══════════════════════════════════════════════"
echo "  Done! Now re-run your GitHub Actions pipeline"
