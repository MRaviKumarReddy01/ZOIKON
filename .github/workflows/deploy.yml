name: Zoikon Chatbot CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Enable required GCP APIs ──────────────────────────────────────────
      - name: Enable GCP APIs
        run: |
          gcloud services enable artifactregistry.googleapis.com \
            run.googleapis.com \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # ── 5. Create Artifact Registry repository (safe if already exists) ───────
      - name: Create Artifact Registry repository
        run: |
          gcloud artifacts repositories create zoikon \
            --repository-format=docker \
            --location=europe-west1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet 2>/dev/null || echo "Repository already exists, continuing..."

      # ── 6. Configure Docker for Artifact Registry ─────────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      # ── 7. Build Docker image ─────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoikon/zoikon:${{ github.sha }} \
            -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoikon/zoikon:latest \
            .

      # ── 8. Push to Artifact Registry ──────────────────────────────────────────
      - name: Push Docker image
        run: |
          docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoikon/zoikon:${{ github.sha }}
          docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoikon/zoikon:latest

      # ── 9. Deploy to Cloud Run ────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zoikon \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zoikon/zoikon:${{ github.sha }} \
            --platform managed \
            --region europe-west1 \
            --port 8080 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # ── 10. Show deployed URL ─────────────────────────────────────────────────
      - name: Get deployed URL
        run: |
          echo "✅ Deployment successful!"
          gcloud run services describe zoikon \
            --platform managed \
            --region europe-west1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)'