name: Zoikon Chatbot CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker for GCR ──────────────────────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet

      # ── 5. Build Docker image ─────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/zoikon:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/zoikon:latest \
            .

      # ── 6. Push to Google Container Registry ──────────────────────────────────
      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/zoikon:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/zoikon:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zoikon \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/zoikon:latest \
            --platform managed \
            --region europe-west1 \
            --port 8080 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      # ── 8. Show deployed URL ──────────────────────────────────────────────────
      - name: Get deployed URL
        run: |
          echo "✅ Deployment successful!"
          gcloud run services describe zoikon \
            --platform managed \
            --region europe-west1 \
            --format 'value(status.url)'
