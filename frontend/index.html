
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zoiko Mobile — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Swiggy-inspired palette */
  --org:#FC8019;--org-d:#E8722A;--org-light:rgba(252,128,25,.12);--org-glow:rgba(252,128,25,.3);
  --teal:#00C9A7;--teal-light:rgba(0,201,167,.12);
  --dark:#0D0D0D;--panel:#1A1A1A;--card:#242424;--card2:#2E2E2E;
  --border:rgba(255,255,255,.08);--border-org:rgba(252,128,25,.25);
  --text:#F5F5F5;--muted:#888;--muted2:#AAA;
  --green:#48BB78;--red:#FC5C65;--gold:#FFD700;
  --font-h:'Nunito',sans-serif;--font-b:'Inter',sans-serif;
  --radius:20px;--radius-sm:12px;
}
body{font-family:var(--font-b);background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ── ANIMATED BACKGROUND ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(252,128,25,.08) 0%,transparent 60%),
  radial-gradient(ellipse 50% 50% at 80% 80%,rgba(0,201,167,.05) 0%,transparent 60%)}
.bg-dots{position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(252,128,25,.06) 1px,transparent 1px);
  background-size:28px 28px;animation:bgdrift 30s linear infinite}
@keyframes bgdrift{0%{transform:translate(0,0)}100%{transform:translate(28px,28px)}}

/* ── MAIN WIDGET ── */
.widget{position:relative;z-index:10;width:420px;max-width:calc(100vw - 12px);height:700px;max-height:calc(100dvh - 12px);display:flex;flex-direction:column;border-radius:var(--radius);background:var(--panel);border:1px solid var(--border);box-shadow:0 0 0 1px rgba(252,128,25,.06),0 32px 80px rgba(0,0,0,.8),0 0 60px rgba(252,128,25,.04);overflow:hidden;animation:widgetUp .55s cubic-bezier(.22,1,.36,1) both}
@keyframes widgetUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

/* ── HEADER — Swiggy app style ── */
.hdr{background:linear-gradient(180deg,#1E1008 0%,#1A1A1A 100%);border-bottom:1px solid var(--border-org);padding:12px 14px;flex-shrink:0;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(252,128,25,.06) 0%,transparent 60%)}
.hdr-top{display:flex;align-items:center;gap:10px;position:relative}
.avatar{width:42px;height:42px;border-radius:14px;background:#fff;padding:3px;flex-shrink:0;position:relative;box-shadow:0 0 0 2px var(--org),0 4px 16px var(--org-glow)}
.avatar img{width:100%;height:100%;object-fit:contain;border-radius:11px}
.status-dot{position:absolute;bottom:0px;right:0px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--panel);box-shadow:0 0 6px rgba(72,187,120,.6);animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}
.hdr-info{flex:1}
.hdr-name{font-family:var(--font-h);font-weight:800;font-size:15.5px;color:var(--text);letter-spacing:-.01em}
.hdr-badge{display:inline-flex;align-items:center;gap:4px;background:var(--org-light);border:1px solid var(--border-org);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--org);font-weight:700;letter-spacing:.04em;margin-top:2px}
.hdr-live{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--green);font-weight:600;margin-top:1px}
.hdr-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-actions{display:flex;gap:6px}
.hbtn{width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.18s}
.hbtn:hover{background:var(--org-light);color:var(--org);border-color:var(--border-org)}
.hbtn.active{background:var(--org-light);color:var(--org);border-color:var(--border-org)}

/* ── AGENT BAR ── */
.agent-bar{background:rgba(252,128,25,.06);border-bottom:1px solid var(--border-org);padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted2);flex-shrink:0;flex-wrap:wrap}
.agent-bar span{color:var(--org);font-weight:700}
.agent-dot{width:6px;height:6px;border-radius:50%;background:var(--org);opacity:.6;animation:pulse 2s infinite}
.prod-badge{background:rgba(72,187,120,.12);border:1px solid rgba(72,187,120,.25);border-radius:20px;padding:1px 8px;font-size:9.5px;color:var(--green);font-weight:800;letter-spacing:.04em;margin-left:auto}

/* ── TOOL BAR ── */
.tool-bar{height:0;overflow:hidden;flex-shrink:0;transition:all .28s cubic-bezier(.22,1,.36,1);background:rgba(252,128,25,.05);border-bottom:0 solid var(--border-org);display:flex;align-items:center;gap:8px;padding:0 14px;font-size:11.5px;color:var(--org);font-weight:600}
.tool-bar.on{height:34px;border-bottom-width:1px}
.tool-spin{width:12px;height:12px;border:2px solid rgba(252,128,25,.2);border-top-color:var(--org);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── VOICE BAR ── */
.vbar-wrap{height:0;overflow:hidden;flex-shrink:0;transition:height .3s;background:rgba(252,128,25,.04);border-bottom:0 solid var(--border-org)}
.vbar-wrap.on{height:48px;border-bottom-width:1px}
.vbar-inner{height:48px;display:flex;align-items:center;justify-content:center;gap:3px}
.vb{width:3px;border-radius:3px;background:var(--org)}
.vb:nth-child(1){animation:wav .9s .00s ease-in-out infinite;height:6px}
.vb:nth-child(2){animation:wav .9s .07s ease-in-out infinite;height:14px}
.vb:nth-child(3){animation:wav .9s .14s ease-in-out infinite;height:24px}
.vb:nth-child(4){animation:wav .9s .10s ease-in-out infinite;height:30px}
.vb:nth-child(5){animation:wav .9s .03s ease-in-out infinite;height:18px}
.vb:nth-child(6){animation:wav .9s .18s ease-in-out infinite;height:26px}
.vb:nth-child(7){animation:wav .9s .07s ease-in-out infinite;height:16px}
.vb:nth-child(8){animation:wav .9s .14s ease-in-out infinite;height:22px}
.vb:nth-child(9){animation:wav .9s .21s ease-in-out infinite;height:10px}
@keyframes wav{0%,100%{transform:scaleY(1);opacity:.5}50%{transform:scaleY(2.2);opacity:1}}
.vlabel{font-size:10.5px;color:var(--org);font-family:var(--font-h);font-weight:700;letter-spacing:.05em;margin-left:12px}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(252,128,25,.2);border-radius:3px}

/* ── WELCOME ── */
.welcome{text-align:center;padding:6px 0 2px;animation:fadeIn .5s ease}
.wlogo img{height:44px;width:auto;object-fit:contain;filter:drop-shadow(0 0 12px rgba(252,128,25,.4))}
.wsub{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:500}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── QUICK CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:4px 0}
.chip{padding:6px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:rgba(252,128,25,.06);color:var(--org);cursor:pointer;transition:.18s;white-space:nowrap;font-family:var(--font-h);font-weight:700}
.chip:hover{background:rgba(252,128,25,.18);border-color:var(--border-org);transform:translateY(-1px)}

/* ── MESSAGES ── */
.msg{display:flex;gap:8px;align-items:flex-end;animation:msgIn .28s cubic-bezier(.22,1,.36,1) both;max-width:92%}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}
.mava{width:26px;height:26px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.msg.bot .mava{background:#fff;padding:2px;box-shadow:0 0 0 2px var(--org-light)}
.msg.user .mava{background:linear-gradient(135deg,#1E2B40,#2A3A54);font-size:12px}
.mava img{width:100%;height:100%;object-fit:contain}
.bubble{padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.62;max-width:100%}
.msg.user .bubble{background:linear-gradient(135deg,var(--org),var(--org-d));color:#fff;border-bottom-right-radius:4px;font-weight:500;box-shadow:0 4px 14px rgba(252,128,25,.3)}
.msg.bot .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}

/* ── TYPING DOTS ── */
.dots{display:flex;gap:4px;padding:3px 0}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--org);opacity:.5;animation:dotB 1.1s ease infinite}
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes dotB{0%,60%,100%{transform:none;opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* ── REACTIONS ── */
.reactions{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.react-btn,.speak-btn,.copy-btn{background:none;border:1px solid transparent;cursor:pointer;font-size:11px;color:var(--muted);transition:.18s;display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:8px;font-family:var(--font-b)}
.react-btn:hover,.speak-btn:hover,.copy-btn:hover{background:rgba(252,128,25,.08);color:var(--org);border-color:var(--border-org)}
.react-btn.liked{color:var(--green);border-color:rgba(72,187,120,.3);background:rgba(72,187,120,.06)}
.react-btn.disliked{color:var(--red);border-color:rgba(252,92,101,.3);background:rgba(252,92,101,.06)}
.speak-btn.on{color:var(--org);animation:spkPulse 1s infinite}
@keyframes spkPulse{0%,100%{opacity:1}50%{opacity:.4}}
.copy-btn.done{color:var(--green)}

/* ── SUGGESTION CHIPS ── */
.suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.sug{padding:5px 11px;border-radius:12px;font-size:11px;border:1px solid var(--border);background:rgba(252,128,25,.05);color:var(--org);cursor:pointer;transition:.18s;font-weight:600;font-family:var(--font-h)}
.sug:hover{background:rgba(252,128,25,.15);border-color:var(--border-org)}

/* ══ CARD SYSTEM — Swiggy-style ══ */

/* Menu Cards — like Swiggy categories */
.menu-cards{display:flex;flex-direction:column;gap:6px;margin-top:8px;width:100%}
.menu-card{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .16s;width:100%;text-align:left;font-family:var(--font-b);position:relative;overflow:hidden}
.menu-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--org);opacity:0;transition:.16s;border-radius:0 3px 3px 0}
.menu-card:hover{background:rgba(252,128,25,.08);border-color:var(--border-org);transform:translateX(2px)}
.menu-card:hover::before{opacity:1}
.menu-card:active{transform:scale(.98)}
.menu-card-ico{font-size:20px;flex-shrink:0;width:30px;text-align:center}
.menu-card-body{flex:1}
.menu-card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;font-family:var(--font-h)}
.menu-card-sub{font-size:10.5px;color:var(--muted);margin-top:1px}
.menu-card-arr{color:var(--org);font-size:16px;flex-shrink:0;opacity:.7}

/* Plan Cards — horizontal scroll like Swiggy restaurant cards */
.plan-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 10px;margin-top:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.plan-scroll::-webkit-scrollbar{display:none}
.plan-card{flex-shrink:0;width:150px;border-radius:16px;border:1px solid var(--border);background:var(--card);padding:14px 12px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.plan-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(252,128,25,.06),transparent 60%);opacity:0;transition:.18s}
.plan-card:hover{border-color:var(--org);box-shadow:0 0 0 1px var(--org),0 6px 20px rgba(252,128,25,.2);transform:translateY(-2px)}
.plan-card:hover::after{opacity:1}
.plan-card-badge{display:inline-block;font-size:9px;font-weight:800;background:var(--org);color:#fff;border-radius:20px;padding:2px 7px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.plan-card-name{font-family:var(--font-h);font-weight:800;font-size:12px;color:var(--org);margin-bottom:4px}
.plan-card-price{font-size:22px;font-weight:900;color:var(--text);line-height:1;font-family:var(--font-h)}
.plan-card-price span{font-size:11px;font-weight:400;color:var(--muted);font-family:var(--font-b)}
.plan-card-data{font-size:11px;color:var(--muted2);margin-top:4px;font-weight:600}
.plan-card-perks{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.plan-card-perk{font-size:10px;color:var(--muted2)}.plan-card-perk::before{content:"✓ ";color:var(--org);font-weight:800}
.plan-card-btn{width:100%;margin-top:10px;padding:7px;border-radius:9px;border:none;background:var(--org);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:.16s;letter-spacing:.02em}
.plan-card-btn:hover{background:var(--org-d);transform:scale(1.02)}

/* Info Card — like Swiggy restaurant details */
.info-card{border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);overflow:hidden;margin-top:8px}
.info-card-hdr{background:linear-gradient(90deg,rgba(252,128,25,.14),rgba(252,128,25,.04));padding:10px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.info-card-hdr-ico{font-size:17px}
.info-card-hdr-title{font-family:var(--font-h);font-weight:800;font-size:12.5px;color:var(--org)}
.info-card-body{padding:4px 0}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 13px;border-bottom:1px solid rgba(255,255,255,.03)}
.info-row:last-child{border-bottom:none}
.info-row-label{font-size:11.5px;color:var(--muted);font-weight:500}
.info-row-val{font-size:11.5px;font-weight:700;color:var(--text);text-align:right}
.info-row-val.org{color:var(--org)}
.info-row-val.green{color:var(--green)}

/* Step Card */
.step-card{border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);padding:13px;margin-top:8px}
.step-card-title{font-size:9.5px;color:var(--muted);margin-bottom:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.step-item{display:flex;align-items:flex-start;gap:10px;position:relative;padding-bottom:13px}
.step-item:last-child{padding-bottom:0}
.step-item::before{content:"";position:absolute;left:12px;top:26px;bottom:0;width:1.5px;background:rgba(252,128,25,.15)}
.step-item:last-child::before{display:none}
.step-num{width:24px;height:24px;border-radius:50%;border:2px solid var(--org);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--org);flex-shrink:0;background:rgba(252,128,25,.08);font-family:var(--font-h)}
.step-body-title{font-size:12px;font-weight:700;color:var(--text);padding-top:2px;line-height:1.4;font-family:var(--font-h)}
.step-body-sub{font-size:10.5px;color:var(--muted);margin-top:2px}

/* Compare Card — like Swiggy comparison */
.compare-card{border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);overflow:hidden;margin-top:8px}
.compare-hdr{display:grid;grid-template-columns:1fr 1fr 1fr;background:rgba(252,128,25,.08);border-bottom:1px solid var(--border)}
.compare-hdr-cell{padding:8px 6px;font-size:10px;font-weight:800;color:var(--org);text-align:center;font-family:var(--font-h);letter-spacing:.02em;border-right:1px solid var(--border)}
.compare-hdr-cell:first-child{color:var(--muted);font-weight:600}
.compare-hdr-cell:last-child{border-right:none}
.compare-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid rgba(255,255,255,.03)}
.compare-row:last-child{border-bottom:none}
.compare-cell{padding:7px 6px;font-size:10.5px;text-align:center;border-right:1px solid rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center}
.compare-cell:last-child{border-right:none}
.compare-cell.label{color:var(--muted);font-size:10px;font-weight:600;text-align:left;justify-content:flex-start;padding-left:10px}
.compare-cell.win{color:var(--green);font-weight:700}
.compare-cell.val{color:var(--text);font-weight:600}

/* Action Bar — like Swiggy CTA buttons */
.action-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.act-btn{padding:8px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:11.5px;font-weight:600;cursor:pointer;font-family:var(--font-h);transition:.16s;white-space:nowrap}
.act-btn:hover{background:rgba(252,128,25,.12);border-color:var(--border-org);color:var(--org);transform:translateY(-1px)}
.act-btn:active{transform:scale(.97)}
.act-btn.primary{background:var(--org);color:#fff;border-color:var(--org);box-shadow:0 4px 12px rgba(252,128,25,.35)}
.act-btn.primary:hover{background:var(--org-d);transform:translateY(-2px);box-shadow:0 6px 18px rgba(252,128,25,.45)}
.act-btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.act-btn.green:hover{filter:brightness(1.08)}

/* Notification strip */
.notif-strip{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;font-size:11.5px;margin-top:8px;font-weight:500}
.notif-strip.success{background:rgba(72,187,120,.08);border:1px solid rgba(72,187,120,.2);color:var(--green)}
.notif-strip.info{background:rgba(252,128,25,.07);border:1px solid rgba(252,128,25,.2);color:var(--org)}
.notif-strip.warn{background:rgba(255,179,71,.07);border:1px solid rgba(255,179,71,.2);color:#FFB347}
.notif-strip.teal{background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.2);color:var(--teal)}

/* Savings Card */
.savings-card{border-radius:var(--radius-sm);border:1px solid rgba(72,187,120,.25);background:linear-gradient(135deg,rgba(72,187,120,.08),rgba(72,187,120,.03));padding:14px;margin-top:8px;overflow:hidden;position:relative}
.savings-card::before{content:'💚';position:absolute;right:-8px;bottom:-8px;font-size:60px;opacity:.08}
.savings-big{font-family:var(--font-h);font-size:28px;font-weight:900;color:var(--green)}
.savings-big span{font-size:13px;font-weight:500;color:var(--muted)}
.savings-sub{font-size:11.5px;color:var(--muted2);margin-top:3px}
.savings-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(72,187,120,.1);font-size:11.5px}
.savings-row:last-child{border-bottom:none}

/* Satisfaction Card */
.sat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;margin-top:6px;animation:fadeIn .4s ease}
.sat-title{font-size:11.5px;color:var(--muted);margin-bottom:8px;font-weight:600}
.sat-stars{display:flex;gap:6px}
.star{font-size:24px;cursor:pointer;transition:.15s;filter:grayscale(1) opacity(.35)}
.star:hover,.star.sel{filter:none;transform:scale(1.2)}
.sat-thanks{font-size:11.5px;color:var(--org);margin-top:6px;font-weight:700}

/* Escalation Card */
.esc-card{background:linear-gradient(135deg,rgba(252,92,101,.08),rgba(252,92,101,.04));border:1px solid rgba(252,92,101,.2);border-radius:var(--radius-sm);padding:13px;margin-top:6px}
.esc-title{font-size:12px;font-weight:800;color:var(--red);margin-bottom:8px;font-family:var(--font-h)}
.esc-form input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 11px;font-size:12px;color:var(--text);margin-bottom:6px;font-family:var(--font-b);outline:none;transition:.18s}
.esc-form input:focus{border-color:rgba(252,92,101,.4);background:rgba(255,255,255,.07)}
.esc-form input::placeholder{color:var(--muted)}
.esc-submit{width:100%;padding:9px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:.18s}
.esc-submit:hover{background:#e04050}

/* ── INPUT AREA ── */
.input-area{padding:10px 10px 14px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0}
.input-row{display:flex;gap:7px;align-items:flex-end}
.txt{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;font-family:var(--font-b);font-size:13px;color:var(--text);outline:none;resize:none;max-height:90px;transition:.18s;line-height:1.5}
.txt::placeholder{color:var(--muted)}
.txt:focus{border-color:var(--border-org);box-shadow:0 0 0 3px rgba(252,128,25,.08)}
.ibtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.18s;flex-shrink:0}
.ibtn:hover{background:rgba(252,128,25,.1);color:var(--org);border-color:var(--border-org)}
.send{width:40px;height:40px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--org),var(--org-d));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 4px 12px rgba(252,128,25,.4);transition:.18s}
.send:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(252,128,25,.55)}
.send:active{transform:scale(.96)}
.send:disabled{opacity:.45;cursor:default;transform:none}
.mic-on{background:rgba(252,92,101,.15)!important;border-color:var(--red)!important;color:var(--red)!important;animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(252,92,101,.3)}50%{box-shadow:0 0 0 7px rgba(252,92,101,0)}}
.char-count{font-size:10px;color:var(--muted);text-align:right;margin-top:3px}
.char-count.warn{color:#FFB347}
.char-count.over{color:var(--red)}
.hint{font-size:10px;color:var(--muted);text-align:center;margin-top:5px}
.hint kbd{padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-family:monospace;font-size:9px}

/* ── TOAST ── */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border-org);border-radius:30px;padding:8px 18px;font-size:12px;color:var(--text);z-index:9999;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.6);animation:toastIn .28s cubic-bezier(.22,1,.36,1) both}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-6px)}}

/* ── HISTORY MODAL ── */
.hist-ov{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.hist-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:420px;max-height:70vh;display:flex;flex-direction:column;animation:widgetUp .3s cubic-bezier(.22,1,.36,1)}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 17px;border-bottom:1px solid var(--border);flex-shrink:0}
.hist-body{overflow-y:auto;padding:10px 13px;flex:1}
.hist-item{margin:7px 0;border:1px solid var(--border);border-radius:10px;padding:9px 11px;background:rgba(255,255,255,.02)}
.hist-item summary{cursor:pointer;font-weight:700;color:var(--org);font-size:11.5px;list-style:none;font-family:var(--font-h)}
.hist-item summary::before{content:'▶ ';font-size:9px}
.hist-item[open] summary::before{content:'▼ '}

/* ── PERM MODAL ── */
.perm-ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.perm-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;max-width:320px;width:100%}
.perm-ico{font-size:36px;text-align:center;margin-bottom:10px}
.perm-ttl{font-family:var(--font-h);font-weight:800;font-size:15px;text-align:center;margin-bottom:6px}
.perm-desc{font-size:12px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:14px}
.perm-steps{background:rgba(255,255,255,.03);border-radius:10px;padding:11px 13px;margin-bottom:14px;border:1px solid var(--border)}
.pstep{font-size:11.5px;display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;line-height:1.5}
.pstep:last-child{margin-bottom:0}
.pnum{width:17px;height:17px;border-radius:50%;background:var(--org);color:#fff;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pbtns{display:flex;gap:7px}
.pbtn{flex:1;padding:9px;border-radius:10px;font-size:12px;font-family:var(--font-h);cursor:pointer;transition:.18s;border:1px solid var(--border);font-weight:700}
.pbtn.pri{background:var(--org);color:#fff;border-color:var(--org)}
.pbtn.pri:hover{background:var(--org-d)}
.pbtn.sec{background:transparent;color:var(--muted)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  body{align-items:flex-end;justify-content:center;padding:0}
  .widget{border-radius:20px 20px 0 0;width:100vw;max-width:100vw;height:94dvh;max-height:94dvh}
  .hdr{padding:10px 12px}
  .msgs{padding:12px 10px}
  .bubble{font-size:12.5px;padding:9px 11px}
  .hint{display:none}
  .input-area{padding:8px 8px 18px}
}
@media(min-width:601px) and (max-width:1024px){
  .widget{width:min(560px, calc(100vw - 40px));height:min(800px, calc(100vh - 40px));border-radius:24px}
  .hdr{padding:14px 18px}
  .msgs{padding:18px 16px;gap:12px}
  .bubble{font-size:13.5px;padding:11px 15px}
}
@media(min-width:1025px){
  .widget{width:460px;height:min(760px, calc(100vh - 60px));border-radius:24px}
  .msgs{padding:16px 14px;gap:11px}
}
@media(min-width:1440px){
  .widget{width:500px;height:min(800px, calc(100vh - 80px))}
}

/* ── CLICKABLE LINK BUTTONS ── */
.link-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(252,128,25,.1);border:1px solid rgba(252,128,25,.28);border-radius:9px;padding:7px 13px;color:var(--org);font-size:12px;font-weight:700;text-decoration:none;transition:.16s;font-family:var(--font-h);white-space:nowrap}
.link-btn:hover{background:rgba(252,128,25,.22);transform:translateY(-1px);box-shadow:0 3px 10px rgba(252,128,25,.25)}
.link-btn:active{transform:scale(.97)}
.links-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
/* ── CONVERSATION STEP LIST ── */
.conv-step{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.conv-step:last-child{border-bottom:none}
.conv-step-num{min-width:20px;height:20px;border-radius:50%;background:var(--org);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-h)}
.conv-step-txt{font-size:12.5px;color:var(--text);line-height:1.5;padding-top:1px}
.conv-step-txt a{color:var(--org);font-weight:700;text-decoration:none}
.conv-step-txt a:hover{text-decoration:underline}
</style>
</head>

function executeTool(name, input) {
  switch(name) {

    case 'get_plan_details': {
      const key = (input.plan_name||'').toLowerCase().trim();
      let plan = PLANS[key];
      if (!plan) {
        const m = Object.keys(PLANS).find(k => k.includes(key.split(' ').pop()) || key.includes(k.split(' ').pop()));
        plan = m ? PLANS[m] : null;
      }
      if (!plan) return { success:false, error:"Plan not found. Please check https://zoikomobile.com/plans for our full list.", available:Object.values(PLANS).map(p=>p.name), link:"https://zoikomobile.com/plans" };
      return { success:true, plan, view_online:"https://zoikomobile.com/plans" };
    }

    case 'check_device_compatibility': {
      const d = (input.device||'').toLowerCase();
      const is5G = ['iphone 12','iphone 13','iphone 14','iphone 15','s21','s22','s23','s24','pixel 6','pixel 7','pixel 8','oneplus 10','oneplus 11'].some(m=>d.includes(m));
      const hasESIM = ['iphone xs','iphone xr','iphone 11','iphone 12','iphone 13','iphone 14','iphone 15','s20','s21','s22','s23','s24','pixel 3a','pixel 4','pixel 5','pixel 6','pixel 7','pixel 8'].some(m=>d.includes(m));
      const ok = ['iphone','samsung','galaxy','pixel','oneplus','motorola','moto','nokia','sony','xiaomi','lg'].some(b=>d.includes(b));
      return {
        success:true, device:input.device, compatible:ok, fiveG:is5G, esim:hasESIM,
        network:"T-Mobile 5G + 4G LTE",
        message: ok
          ? `${input.device} works with Zoiko Mobile! ${is5G?'It supports 5G.':''} ${hasESIM?'eSIM supported — activate in under 2 minutes!':''}`
          : `Please ensure your device is unlocked (GSM-compatible).`,
        check_url:"https://zoikomobile.com/byod-plans/",
        activate_url:"https://zoikomobile.com/how-to-activate-sim/"
      };
    }

    case 'calculate_family_savings': {
      const lines = Number(input.num_lines)||2;
      const bill  = Number(input.current_monthly_bill)||0;
      const pp    = 25;
      const disc  = lines>=3 ? pp*0.80 : pp;
      const total = +(disc*lines).toFixed(2);
      const saved = bill>0 ? +(bill-total).toFixed(2) : null;
      return {
        success:true, lines, zoiko_total:total, per_line:+disc.toFixed(2),
        discount_applied:lines>=3, discount:lines>=3?"20%":"0%",
        monthly_savings:saved, annual_savings:saved?+(saved*12).toFixed(0):null,
        note:lines>=3?`With ${lines} lines you get 20% off automatically — $${+(pp*0.2*lines).toFixed(2)}/mo savings!`:`Add ${3-lines} more line(s) to unlock the 20% family discount!`,
        signup_url:"https://zoikomobile.com/plans",
        business_url:"https://zoikomobile.com/business-deals"
      };
    }

    case 'find_nearest_office': {
      const loc = (input.location||'').toLowerCase();
      const offices = [
        {city:"Austin",      state:"TX", address:"5900 Balcones Dr #24685", zip:"78731", phone:"800-988-8116"},
        {city:"Washington",  state:"DC", address:"1717 N St NW Suite 1",    zip:"20036", phone:"800-988-8116"},
        {city:"Sacramento",  state:"CA", address:"1401 21st St Suite R",    zip:"95811", phone:"800-988-8116"},
        {city:"Springfield", state:"IL", address:"2501 Chatham Rd Suite R", zip:"62704", phone:"847-728-6872"},
        {city:"Dover",       state:"DE", address:"8 The Green Suite A",     zip:"19901", phone:"302-899-7312"},
        {city:"Orlando",     state:"FL", address:"12386 State Rd 535 #302", zip:"32836", phone:"800-988-8116"}
      ];
      const found = offices.find(o=>loc.includes(o.city.toLowerCase())||loc.includes(o.state.toLowerCase()));
      return { success:true, nearest:found||offices[0], all_offices:offices, found_match:!!found, contact_url:"https://zoikomobile.com/contact-us" };
    }

    case 'get_active_promotions': {
      return {
        success:true,
        promotions:[
          {emoji:"👨‍👩‍👧", title:"Family Saver", desc:"20% OFF with 3+ lines — save up to $25/mo!", badge:"HOT", link:"https://zoikomobile.com/plans"},
          {emoji:"📲",    title:"Free Port-In",  desc:"Transfer your number from any carrier for free.", badge:"ONGOING", link:"https://zoikomobile.com/plans"},
          {emoji:"⚡",    title:"Zero Activation Fees", desc:"No setup costs on any plan, ever.", badge:"ALWAYS", link:"https://zoikomobile.com/plans"},
          {emoji:"🎉",    title:"First Month 50% Off", desc:"New customers get 50% off first month on Core+.", badge:"LIMITED", link:"https://zoikomobile.com/plans"},
          {emoji:"🌍",    title:"Free International Calling", desc:"Call 70–200+ countries free on all plans.", badge:"ALL PLANS", link:"https://zoikomobile.com/plans"},
          {emoji:"🔄",    title:"AutoPay Discount", desc:"Save $5/mo extra when you set up AutoPay.", badge:"ONGOING", link:"https://zoikomobile.com/plans"}
        ],
        view_all:"https://zoikomobile.com/plans"
      };
    }

    case 'create_callback_request': {
      const ref = 'ZKN-'+Date.now().toString().slice(-6);
      setTimeout(()=>addEscalateWithData(input.name, input.phone, input.issue, ref), 400);
      return {
        success:true, ticket_id:ref,
        callback_time:input.priority==='urgent'?"Within 1 hour":"Within 24 hours",
        contact_url:"https://zoikomobile.com/contact-us",
        customer_service_url:"https://zoikomobile.com/customer-service",
        message:`Callback created! Ref: ${ref}. Our team will call ${input.phone} ${input.priority==='urgent'?'within 1 hour':'within 24 hours'}.`
      };
    }

    case 'check_coverage': {
      return {
        success:true, location:input.location,
        coverage_5g:true, coverage_4g:true, quality:"Excellent",
        network:"T-Mobile nationwide",
        note:`Zoiko Mobile has excellent 5G and 4G LTE coverage in ${input.location} via T-Mobile's network.`,
        coverage_map:"https://zoikomobile.com/coverage"
      };
    }

    case 'compare_plans': {
      const fp = n => { const k=n.toLowerCase(); return PLANS[k]||PLANS[Object.keys(PLANS).find(pk=>pk.includes(k.split(' ').pop()))||'']||null; };
      const a = fp(input.plan_a), b = fp(input.plan_b);
      return { success:true, plan_a:a||{name:input.plan_a,error:"not found"}, plan_b:b||{name:input.plan_b,error:"not found"}, compare_url:"https://zoikomobile.com/plans" };
    }

    case 'handle_billing_issue': {
      return {
        success:true,
        issue_type:input.issue_type||'general',
        login_url:"https://zoikomobile.com/login",
        contact_url:"https://zoikomobile.com/contact-us",
        customer_service_url:"https://zoikomobile.com/customer-service",
        steps: input.issue_type==='overcharge'
          ? ["Log in to your account","Go to Billing → Transaction History","Find the charge in question","If incorrect, click 'Dispute this charge'","Or contact us at https://zoikomobile.com/contact-us"]
          : input.issue_type==='invoice'
          ? ["Log in at https://zoikomobile.com/login","Go to Account → Billing","Download PDF invoice for any month"]
          : ["Log in at https://zoikomobile.com/login","Go to Account → Billing → Payment Methods","Update or add a payment method","Or call 800-988-8116"]
      };
    }

    case 'handle_account_management': {
      return {
        success:true,
        action_type:input.action_type||'general',
        login_url:"https://zoikomobile.com/login",
        contact_url:"https://zoikomobile.com/contact-us",
        customer_service_url:"https://zoikomobile.com/customer-service",
        steps: input.action_type==='change_email'
          ? ["Log in at https://zoikomobile.com/login","Go to Account Settings → Personal Information","Update your email address","Verify via the confirmation email","Save changes"]
          : input.action_type==='forgot_password'
          ? ["Go to https://zoikomobile.com/login","Click 'Forgot Password'","Enter your email address","Check your inbox for the reset link (check spam too!)","Follow the link to create a new password"]
          : input.action_type==='cancel'
          ? ["Log in at https://zoikomobile.com/login","Go to Account → Plan Management","Select 'Cancel Plan' or 'Downgrade'","Prepaid: cancels at end of billing cycle","Postpaid: early termination fees may apply","For help: https://zoikomobile.com/contact-us"]
          : ["Log in at https://zoikomobile.com/login","Go to Account Settings","Make your changes","Save and confirm"]
      };
    }

    default:
      return { success:false, error:"Unknown tool: "+name };
  }
}

async function send() {
  const text = txt.value.trim();
  if (!text||typing) return;
  if (text.length>500){ toast('Message too long! Max 500 characters.'); return; }

  document.querySelectorAll('#welcome,#chips').forEach(el=>{
    el.style.transition='opacity .2s'; el.style.opacity='0';
    setTimeout(()=>el.remove(),220);
  });

  addUserMsg(text);
  chatMsgs.push({role:'user',content:text});
  txt.value=''; txt.style.height='auto'; charCount.textContent='';
  sendBtn.disabled=true; typing=true;
  showTyping();

async function sendMessage(message) {
  const response = await fetch("http://localhost:8000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message})
  });

  const data = await response.json();
  return data.response;
}

async function handleSend() {
  const input = document.getElementById("userInput");
  const userMessage = input.value;

  const reply = await sendMessage(userMessage);

  console.log("Bot:", reply);   // display in chat UI
}

  // ── FALLBACK (no API key) ──
  if (!API_KEY||API_KEY==='YOUR_API_KEY_HERE') {
    await delay(800+Math.random()*500);
    hideTyping();
    const sr = smartReply(text);
    chatMsgs.push({role:'assistant',content:sr.text||''});
    streamMsg(sr.text||'', ()=>{ if(autoSpeak&&sr.text) speak(sr.text); }, sr.cards||[]);
    sendBtn.disabled=false; typing=false;
    return;
  }

  try {
    let messages = chatMsgs.slice(-20);
    let finalReply = null, toolsUsed = [];

    for (let turn=0; turn<6; turn++) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:900,system:SYSTEM,tools:TOOLS,messages})
      });
      const data = await res.json();
      if (data.error) {
        if (data.error.type==='authentication_error'){ hideTyping();hideToolBar();streamMsg('⚠️ Invalid API key. Grab a free one at console.anthropic.com');sendBtn.disabled=false;typing=false;return; }
        throw new Error(data.error.message||'API error');
      }
      const toolUses = (data.content||[]).filter(b=>b.type==='tool_use');
      const textParts = (data.content||[]).filter(b=>b.type==='text');
      if (!toolUses.length){ finalReply=textParts.map(b=>b.text).join('').trim(); break; }
      messages.push({role:'assistant',content:data.content});
      const results = [];
      for (const tc of toolUses) {
        toolsUsed.push(tc.name);
        const labels = TOOL_LABELS[tc.name]||["🤔 Processing..."];
        showToolBar(labels[Math.floor(Math.random()*labels.length)]);
        await delay(300);
        results.push({type:'tool_result',tool_use_id:tc.id,content:JSON.stringify(executeTool(tc.name,tc.input))});
      }
      messages.push({role:'user',content:results});
      showToolBar('💭 Writing a response...');
    }

    if (!finalReply){ const sr=smartReply(text); finalReply=sr.text||''; }
    hideTyping(); hideToolBar();
    chatMsgs.push({role:'assistant',content:finalReply});
    // Attach smart cards even in API mode for rich UX
    const srCards = smartReply(text);
    const apiCards = srCards.cards||[];
    streamMsg(finalReply,()=>{
      if(autoSpeak) speak(finalReply);
      saveHistory(text,finalReply,toolsUsed);
      if(/frustrated|angry|terrible|worst|useless|speak to (human|agent|person)/i.test(text)) setTimeout(addEscalate,500);
      if(/cancel|cancell/i.test(text)&&!/not cancel/i.test(text)) setTimeout(()=>{
        const hint=makeNotif('warn','⚠️','Need help with cancellation? Our retention team may have offers for you!');
        document.querySelector('.msgs').lastElementChild&&document.querySelector('.msgs').lastElementChild.querySelector('.bubble')&&document.querySelector('.msgs').lastElementChild.appendChild(hint);
      },800);
    }, apiCards);
  } catch(err) {
    hideTyping(); hideToolBar();
    const sr=smartReply(text);
    chatMsgs.push({role:'assistant',content:sr.text||''});
    streamMsg(sr.text||'',()=>{ if(autoSpeak&&sr.text) speak(sr.text); },sr.cards||[]);
    console.error('Zoikon err:',err);
  }
  sendBtn.disabled=false; typing=false;
}

// ══════════════════════════════════════════════
function streamMsg(text, callback, cards) {
  msgCount++;
  const wrap=document.createElement('div'); wrap.className='msg bot';
  const ava=document.createElement('div'); ava.className='mava';
  ava.innerHTML=`<img src="${LOGO}" alt="Z"/>`;
  const inner=document.createElement('div'); inner.style.cssText='display:flex;flex-direction:column;max-width:100%';
  const bbl=document.createElement('div'); bbl.className='bubble';
  inner.appendChild(bbl); wrap.appendChild(ava); wrap.appendChild(inner);
  msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;

  const words=(text||'').split(' ');
  let i=0, displayed='';
  const cursor='<span style="display:inline-block;width:2px;height:12px;background:var(--org);margin-left:2px;border-radius:1px;animation:blink .65s infinite;vertical-align:middle"></span>';

  function tick(){
    if(i>=words.length){
      bbl.innerHTML=fmt(text||'');
      appendReactions(inner, text||'', cards);
      if(callback) callback();
      msgs.scrollTop=msgs.scrollHeight; return;
    }
    displayed+=(i>0?' ':'')+words[i];
    bbl.innerHTML=fmt(displayed)+cursor;
    msgs.scrollTop=msgs.scrollHeight; i++;
    const prev=words[i-1];
    const pause=(prev&&(prev.endsWith('.')||prev.endsWith('!')||prev.endsWith('?')))?80:20+Math.random()*14;
    setTimeout(tick,pause);
  }
  tick();
}

function appendReactions(inner, text, cards){
  if(cards&&cards.length) cards.forEach(c=>inner.appendChild(c));

  const rxns=document.createElement('div'); rxns.className='reactions';
  const speakB=document.createElement('button'); speakB.className='speak-btn'; speakB.innerHTML='🔊 Listen';
  speakB.onclick=()=>speak(text,speakB);

  const copyB=document.createElement('button'); copyB.className='copy-btn'; copyB.innerHTML='📋 Copy';
  copyB.onclick=()=>{
    const clean=text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1');
    navigator.clipboard.writeText(clean).then(()=>{ copyB.innerHTML='✅ Copied!'; copyB.classList.add('done'); setTimeout(()=>{ copyB.innerHTML='📋 Copy'; copyB.classList.remove('done'); },2000); }).catch(()=>toast('Please copy manually.'));
  };

  const likeB=document.createElement('button'); likeB.className='react-btn'; likeB.innerHTML='👍 Helpful';
  const dislikeB=document.createElement('button'); dislikeB.className='react-btn'; dislikeB.innerHTML='👎';
  likeB.onclick=()=>{ if(!likeB.classList.contains('liked')){ likeB.classList.add('liked'); likeB.innerHTML='👍 Thanks!'; dislikeB.classList.remove('disliked'); dislikeB.innerHTML='👎'; toast('Thanks for the feedback! 😊'); } };
  dislikeB.onclick=()=>{ if(!dislikeB.classList.contains('disliked')){ dislikeB.classList.add('disliked'); dislikeB.innerHTML='👎 Got it'; likeB.classList.remove('liked'); likeB.innerHTML='👍 Helpful'; toast("I'll do better next time!"); setTimeout(addEscalate,600); } };

  rxns.appendChild(speakB); rxns.appendChild(copyB); rxns.appendChild(likeB); rxns.appendChild(dislikeB);
  inner.appendChild(rxns);

  const sugs = getSuggestions(text);
  if(sugs.length){
    const sugWrap=document.createElement('div'); sugWrap.className='suggestions';
    sugs.forEach(s=>{ const b=document.createElement('div'); b.className='sug'; b.textContent=s; b.onclick=()=>quick(s); sugWrap.appendChild(b); });
    inner.appendChild(sugWrap);
  }
  if(msgCount>0&&msgCount%5===0) setTimeout(()=>inner.appendChild(makeSatCard()),700);
}

function getSuggestions(reply) {
  const r = reply.toLowerCase();
  // Billing flows
  if (r.includes('invoice')||r.includes('download.*bill')||r.includes('view.*bill'))
    return ['Set up AutoPay — save $5/mo','I was overcharged','Update my payment method'];
  if (r.includes('overcharg')||r.includes('dispute')||r.includes('wrong charge'))
    return ['Talk to a live agent','View my invoice','Update my payment method'];
  if (r.includes('payment issue')||r.includes('failed payment')||r.includes('update payment'))
    return ['Talk to a live agent','Set up AutoPay','Check my plan price'];
  if (r.includes('bill changed')||r.includes('bill amount'))
    return ['View my invoice','Talk to a live agent','Check my current plan'];
  // Account flows
  if (r.includes('forgot.*password')||r.includes('reset.*password')||r.includes('locked out'))
    return ['Update my email address','Talk to a live agent','View my account'];
  if (r.includes('change.*email')||r.includes('update.*email')||r.includes('personal information'))
    return ['I forgot my password','Talk to a live agent','View my account'];
  if (r.includes('cancel')||r.includes('close.*account'))
    return ['Switch to a lower plan','Talk to retention team','How do I port my number?'];
  // Business
  if (r.includes('business')||r.includes('business-deals'))
    return ['Calculate savings for 5 lines','View personal plans','Talk to business sales'];
  // Plans
  if ((r.includes('flex')||r.includes('$15'))&&!r.includes('core'))
    return ['Compare Flex vs Core','How do I sign up?','Tell me about eSIM'];
  if ((r.includes('core')||r.includes('$25'))&&!r.includes('max'))
    return ['Compare Core vs Max','Tell me about family plans','How do I sign up?'];
  if ((r.includes('max')||r.includes('$40'))&&!r.includes('infinity'))
    return ['Compare Max vs Infinity','How do I sign up?','Check my phone'];
  if (r.includes('infinity')&&!r.includes('supreme'))
    return ['Compare Infinity vs Supreme','Sign me up!','Tell me about device financing'];
  if (r.includes('supreme')||r.includes('$65'))
    return ['Compare Supreme vs Infinity','Sign me up!','200+ countries list'];
  // Family
  if (r.includes('family')||r.includes('20%')||r.includes('lines'))
    return ['Calculate savings for 4 lines','Can I mix prepaid and postpaid?','How many lines can I add?'];
  // International
  if (r.includes('international')||r.includes('countries')||r.includes('travel'))
    return ['Is India included?','What about Philippines?','Do I pay extra for roaming?'];
  if (r.includes('india')||r.includes('philippine')||r.includes('pakistan'))
    return ['Show me all plans','Compare Core vs Max','How do I sign up?'];
  // Activation
  if (r.includes('esim'))
    return ['How do I activate eSIM?','Which phones support eSIM?','How long does it take?'];
  if (r.includes('activate')||r.includes('sim'))
    return ['Do you have eSIM?','How long does activation take?','Can I keep my number?'];
  if (r.includes('byod')||r.includes('compatible'))
    return ['Check my iPhone compatibility','How do I transfer my number?','Which plans support BYOD?'];
  // Coverage / network
  if (r.includes('coverage')||r.includes('5g'))
    return ['Check coverage in my city','What is Wi-Fi Calling?','Which plan has best speeds?'];
  // Support
  if (r.includes('support')||r.includes('contact')||r.includes('contact-us'))
    return ['Request a callback','Call 800-988-8116','Submit a request online'];
  // Deals
  if (r.includes('deal')||r.includes('promo'))
    return ['Tell me about family savings','What is eSIM?','Compare Core vs Max'];
  return [];
}

//  SPEECH — US FEMALE VOICE
// ══════════════════════════════════════════════
var FEMALE_PRIORITY = [
  'Microsoft Aria Online (Natural) - English (United States)',
  'Microsoft Jenny Online (Natural) - English (United States)',
  'Microsoft Ana Online (Natural) - English (United States)',
  'Microsoft Michelle Online (Natural) - English (United States)',
  'Microsoft Amber Online (Natural) - English (United States)',
  'Microsoft Ashley Online (Natural) - English (United States)',
  'Microsoft Emma Online (Natural) - English (United States)',
  'Microsoft Aria - English (United States)',
  'Microsoft Jenny - English (United States)',
  'Samantha (Enhanced)', 'Samantha',
  'Ava (Enhanced)', 'Ava',
  'Allison (Enhanced)', 'Allison',
  'Susan (Enhanced)', 'Susan',
  'Kathy', 'Victoria', 'Nicky',
  'Google US English',
  'Microsoft Zira - English (United States)',
  'Microsoft Zira Desktop - English (United States)'
];
var MALE_BLOCK = ['david','james','mark','ryan','eric','alex','paul','william','michael','guy','tom','george','brian','fred','ralph','reed','thomas','brandon','liam','matthew','christopher','male'];
function isMale(v){ return MALE_BLOCK.some(m=>v.name.toLowerCase().includes(m)); }
function isFemale(v){ const n=v.name.toLowerCase(); return ['aria','jenny','ana','michelle','amber','ashley','emma','cora','samantha','ava','allison','susan','kathy','victoria','nicky','zira','female','woman','girl','linda','sarah','emily','karen','lisa','mary','patricia'].some(f=>n.includes(f))&&!isMale(v); }
function pickFemaleVoice(){
  const vs = window.speechSynthesis.getVoices();
  for(const t of FEMALE_PRIORITY){ const f=vs.find(v=>v.name.toLowerCase()===t.toLowerCase()); if(f&&!isMale(f)) return f; }
  const fusen = vs.filter(v=>v.lang==='en-US'&&isFemale(v));
  return fusen.find(v=>!v.localService)||fusen[0]||vs.filter(v=>v.lang.startsWith('en')&&isFemale(v))[0]||null;
}

function speak(text, btn){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const clean=text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/<br\/>/g,'. ').replace(/<[^>]+>/g,'').replace(/[^\x00-\x7F]/g,' ').trim();
  if(!clean) return;
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='en-US'; u.rate=0.93; u.pitch=1.18; u.volume=1.0;
  const voice=pickFemaleVoice();
  if(voice){ u.voice=voice; console.log('[Voice]',voice.name); }
  vbarWrap.classList.add('on'); vlabel.textContent='Speaking...';
  u.onend=()=>{ vbarWrap.classList.remove('on'); if(btn){ btn.innerHTML='🔊 Listen'; btn.classList.remove('on'); } };
  u.onerror=()=>{ vbarWrap.classList.remove('on'); if(btn){ btn.innerHTML='🔊 Listen'; btn.classList.remove('on'); } };
  if(btn){ btn.innerHTML='⏹ Stop'; btn.classList.add('on'); btn.onclick=()=>{ window.speechSynthesis.cancel(); btn.innerHTML='🔊 Listen'; btn.classList.remove('on'); vbarWrap.classList.remove('on'); }; }
  if(!window.speechSynthesis.getVoices().length) setTimeout(()=>{ const v2=pickFemaleVoice(); if(v2) u.voice=v2; window.speechSynthesis.speak(u); },150);
  else window.speechSynthesis.speak(u);
}

if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  window.addEventListener('load',()=>window.speechSynthesis.getVoices());

//  SPEECH-TO-TEXT
// ══════════════════════════════════════════════
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  recognition=new SR(); recognition.continuous=false; recognition.interimResults=true; recognition.lang='en-US';
  recognition.onstart=()=>{ listening=true; micBtn.classList.add('mic-on'); vbarWrap.classList.add('on'); vlabel.textContent='Listening...'; };
  recognition.onresult=e=>{ txt.value=Array.from(e.results).map(r=>r[0].transcript).join(''); txt.style.height='auto'; txt.style.height=Math.min(txt.scrollHeight,90)+'px'; };
  recognition.onend=()=>{ listening=false; micBtn.classList.remove('mic-on'); vbarWrap.classList.remove('on'); if(txt.value.trim()) send(); };
  recognition.onerror=e=>{ listening=false; micBtn.classList.remove('mic-on'); vbarWrap.classList.remove('on'); if(e.error!=='no-speech') toast('🎤 Mic error: '+e.error); };
}
micBtn.addEventListener('click',async()=>{
  if(!SR){ toast('❌ Voice not supported. Use Chrome or Edge.'); return; }
  if(listening){ recognition.stop(); return; }
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true}); s.getTracks().forEach(t=>t.stop());
    window.speechSynthesis.cancel(); recognition.start();
  }catch(err){
    if(err.name==='NotAllowedError') showPermModal(); else toast('❌ '+err.message);
  }
});

function toast(msg){
  const ex=document.querySelector('.toast'); if(ex) ex.remove();
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.animation='toastOut .28s ease forwards'; setTimeout(()=>t.remove(),280); },3000);
}
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }
function showPermModal(){
  const ov=document.createElement('div'); ov.className='perm-ov';
  ov.innerHTML='<div class="perm-box"><div class="perm-ico">🎤</div><div class="perm-ttl">Microphone Blocked</div><div class="perm-desc">Enable microphone access in your browser to use voice input.</div><div class="perm-steps"><div class="pstep"><div class="pnum">1</div><div>Click the 🔒 lock icon in the address bar</div></div><div class="pstep"><div class="pnum">2</div><div>Find Microphone and set it to Allow</div></div><div class="pstep"><div class="pnum">3</div><div>Reload the page and try again</div></div></div><div class="pbtns"><button class="pbtn sec" onclick="this.closest(\'.perm-ov\').remove()">Dismiss</button><button class="pbtn pri" onclick="location.reload()">🔄 Reload</button></div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
}
