<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zoiko Mobile — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00C9A7;--teal-d:#00A88C;--teal-glow:rgba(0,201,167,.25);
  --dark:#080E1C;--panel:#111827;--card:#1A2235;--border:rgba(0,201,167,.15);
  --text:#E8EDF5;--muted:#6B7FA0;--red:#FF4757;--gold:#FFD700;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
body{font-family:var(--font-b);background:var(--dark);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 5%,rgba(0,201,167,.1) 0%,transparent 55%),radial-gradient(ellipse 60% 60% at 85% 90%,rgba(0,201,167,.07) 0%,transparent 55%);}
.grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,201,167,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,201,167,.03) 1px,transparent 1px);background-size:44px 44px}
.widget{position:relative;z-index:10;width:430px;max-width:calc(100vw - 16px);height:700px;max-height:calc(100vh - 16px);display:flex;flex-direction:column;border-radius:26px;background:var(--panel);border:1px solid var(--border);box-shadow:0 0 0 1px rgba(0,201,167,.05),0 40px 80px rgba(0,0,0,.7),0 0 100px rgba(0,201,167,.07);overflow:hidden;animation:up .6s cubic-bezier(.22,1,.36,1) both}
@keyframes up{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
.hdr{background:linear-gradient(135deg,#0C1628,#0E1F30);border-bottom:1px solid var(--border);padding:14px 16px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:13px;background:#fff;padding:3px;flex-shrink:0;position:relative;box-shadow:0 0 18px var(--teal-glow)}
.avatar img{width:100%;height:100%;object-fit:contain;border-radius:10px}
.status-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#22d366;border:2px solid var(--panel);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-info{flex:1}
.hdr-name{font-family:var(--font-h);font-weight:800;font-size:15px;letter-spacing:.01em}
.hdr-sub{font-size:10px;color:var(--teal);background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.2);border-radius:20px;padding:2px 8px;display:inline-block;margin-top:3px;font-weight:600;letter-spacing:.04em}
.hdr-status{font-size:11.5px;color:var(--teal);display:flex;align-items:center;gap:5px;margin-top:2px}
.hdr-actions{display:flex;gap:7px}
.hbtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s}
.hbtn:hover{background:rgba(0,201,167,.12);color:var(--teal);border-color:var(--teal)}
.hbtn.active{background:rgba(0,201,167,.15);color:var(--teal);border-color:var(--teal)}
.agent-bar{background:linear-gradient(90deg,rgba(0,201,167,.08),rgba(0,201,167,.03));border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);flex-shrink:0}
.agent-bar span{color:var(--teal);font-weight:600}
/* TOOL ACTIVITY BAR */
.tool-bar{height:0;overflow:hidden;flex-shrink:0;transition:all .3s;background:rgba(0,201,167,.04);border-bottom:0px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 16px;font-size:11.5px;color:var(--teal);font-weight:600}
.tool-bar.on{height:36px;border-bottom-width:1px}
.tool-spinner{width:12px;height:12px;border:2px solid rgba(0,201,167,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.vbar-wrap{height:0;overflow:hidden;flex-shrink:0;transition:height .3s;background:rgba(0,201,167,.04);border-bottom:0px solid var(--border)}
.vbar-wrap.on{height:52px;border-bottom-width:1px}
.vbar-inner{height:52px;display:flex;align-items:center;justify-content:center;gap:3px}
.vb{width:3.5px;border-radius:4px;background:var(--teal)}
.vb:nth-child(1){animation:wav 1s .00s ease-in-out infinite;height:8px}
.vb:nth-child(2){animation:wav 1s .08s ease-in-out infinite;height:16px}
.vb:nth-child(3){animation:wav 1s .16s ease-in-out infinite;height:26px}
.vb:nth-child(4){animation:wav 1s .12s ease-in-out infinite;height:32px}
.vb:nth-child(5){animation:wav 1s .04s ease-in-out infinite;height:20px}
.vb:nth-child(6){animation:wav 1s .20s ease-in-out infinite;height:28px}
.vb:nth-child(7){animation:wav 1s .08s ease-in-out infinite;height:18px}
.vb:nth-child(8){animation:wav 1s .16s ease-in-out infinite;height:24px}
.vb:nth-child(9){animation:wav 1s .24s ease-in-out infinite;height:12px}
.vb:nth-child(10){animation:wav 1s .04s ease-in-out infinite;height:20px}
.vb:nth-child(11){animation:wav 1s .12s ease-in-out infinite;height:30px}
.vb:nth-child(12){animation:wav 1s .20s ease-in-out infinite;height:10px}
@keyframes wav{0%,100%{transform:scaleY(1);opacity:.6}50%{transform:scaleY(2.4);opacity:1}}
.vlabel{font-size:11px;color:var(--teal);font-family:var(--font-h);font-weight:700;letter-spacing:.06em;margin-left:14px}
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(0,201,167,.18);border-radius:4px}
.welcome{text-align:center;padding:8px 0 2px;animation:fade .5s ease}
.wlogo img{height:46px;width:auto;object-fit:contain}
.wsub{font-size:12px;color:var(--muted);margin-top:6px}
@keyframes fade{from{opacity:0}to{opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:4px 0}
.chip{padding:6px 12px;border-radius:20px;font-size:11.5px;border:1px solid var(--border);background:rgba(0,201,167,.06);color:var(--teal);cursor:pointer;transition:.2s;white-space:nowrap;font-family:var(--font-b)}
.chip:hover{background:rgba(0,201,167,.18);border-color:var(--teal);transform:translateY(-1px)}
.msg{display:flex;gap:9px;align-items:flex-end;animation:msgIn .32s cubic-bezier(.22,1,.36,1) both;max-width:90%}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}
.mava{width:28px;height:28px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.msg.bot .mava{background:#fff;padding:2px}
.msg.user .mava{background:linear-gradient(135deg,#1E2B40,#2A3A54);font-size:13px}
.mava img{width:100%;height:100%;object-fit:contain}
.bubble{padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.6;max-width:100%}
.msg.user .bubble{background:var(--teal);color:#001510;border-bottom-right-radius:4px;font-weight:500}
.msg.bot .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
/* TOOL BADGE on messages */
.tool-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--teal);background:rgba(0,201,167,.08);border:1px solid rgba(0,201,167,.2);border-radius:20px;padding:2px 8px;margin-bottom:6px;font-weight:600}
.dots{display:flex;gap:4px;padding:4px 0}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--teal);opacity:.5;animation:dotB 1.2s ease infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,60%,100%{transform:none;opacity:.5}30%{transform:translateY(-6px);opacity:1}}
.reactions{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.react-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px 6px;border-radius:8px;transition:.2s;display:flex;align-items:center;gap:3px;border:1px solid transparent}
.react-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.react-btn.liked{color:#22d366;border-color:rgba(34,211,102,.25);background:rgba(34,211,102,.07)}
.react-btn.disliked{color:var(--red);border-color:rgba(255,71,87,.25);background:rgba(255,71,87,.07)}
.speak-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);transition:.2s;display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:8px;border:1px solid transparent}
.speak-btn:hover{color:var(--teal);background:rgba(0,201,167,.08)}
.speak-btn.on{color:var(--teal);animation:spk 1s infinite}
@keyframes spk{0%,100%{opacity:1}50%{opacity:.4}}
.copy-btn{background:none;border:1px solid transparent;cursor:pointer;font-size:11px;color:var(--muted);transition:.2s;display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:8px}
.copy-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.copy-btn.done{color:var(--teal)}
.sat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-top:6px;animation:fade .4s ease}
.sat-title{font-size:12px;color:var(--muted);margin-bottom:8px}
.sat-stars{display:flex;gap:6px}
.star{font-size:22px;cursor:pointer;transition:.15s;filter:grayscale(1) opacity(.4)}
.star:hover,.star.sel{filter:none;transform:scale(1.2)}
.sat-thanks{font-size:12px;color:var(--teal);margin-top:6px;font-weight:600}
.esc-card{background:linear-gradient(135deg,rgba(255,71,87,.08),rgba(255,71,87,.04));border:1px solid rgba(255,71,87,.2);border-radius:14px;padding:12px 14px;margin-top:6px}
.esc-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px}
.esc-form input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text);margin-bottom:6px;font-family:var(--font-b);outline:none}
.esc-form input:focus{border-color:rgba(255,71,87,.4)}
.esc-form input::placeholder{color:var(--muted)}
.esc-submit{width:100%;padding:8px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:.2s}
.esc-submit:hover{background:#e03e4d}
.suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.sug{padding:5px 11px;border-radius:14px;font-size:11.5px;border:1px solid var(--border);background:rgba(0,201,167,.05);color:var(--teal);cursor:pointer;transition:.2s}
.sug:hover{background:rgba(0,201,167,.15);border-color:var(--teal)}
.input-area{padding:12px 12px 14px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.txt{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:10px 14px;font-family:var(--font-b);font-size:13.5px;color:var(--text);outline:none;resize:none;max-height:100px;transition:.2s;line-height:1.5}
.txt::placeholder{color:var(--muted)}
.txt:focus{border-color:rgba(0,201,167,.45);box-shadow:0 0 0 3px rgba(0,201,167,.07)}
.ibtn{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:.2s;flex-shrink:0}
.ibtn:hover{background:rgba(0,201,167,.1);color:var(--teal);border-color:var(--teal)}
.send{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#001510;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 4px 14px rgba(0,201,167,.3);transition:.2s}
.send:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(0,201,167,.45)}
.send:active{transform:scale(.96)}
.send:disabled{opacity:.5;cursor:default;transform:none}
.mic-on{background:rgba(255,71,87,.15)!important;border-color:var(--red)!important;color:var(--red)!important;animation:micP 1s infinite}
@keyframes micP{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.3)}50%{box-shadow:0 0 0 8px rgba(255,71,87,0)}}
.hint{font-size:10.5px;color:var(--muted);text-align:center;margin-top:7px;display:flex;align-items:center;justify-content:center;gap:6px}
.hint kbd{padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-family:monospace;font-size:9.5px}
.char-count{font-size:10px;color:var(--muted);text-align:right;margin-top:3px}
.char-count.warn{color:#FFB347}
.char-count.over{color:var(--red)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:30px;padding:9px 18px;font-size:12.5px;color:var(--text);z-index:9999;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:tIn .3s cubic-bezier(.22,1,.36,1) both}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.perm-ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s ease}
.perm-box{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:26px 22px;max-width:330px;width:100%;animation:up .3s cubic-bezier(.22,1,.36,1)}
.perm-ico{font-size:38px;text-align:center;margin-bottom:12px}
.perm-ttl{font-family:var(--font-h);font-weight:700;font-size:16px;text-align:center;margin-bottom:7px}
.perm-desc{font-size:12.5px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:16px}
.perm-steps{background:rgba(255,255,255,.03);border-radius:11px;padding:12px 14px;margin-bottom:16px;border:1px solid var(--border)}
.pstep{font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;line-height:1.5}
.pstep:last-child{margin-bottom:0}
.pnum{width:18px;height:18px;border-radius:50%;background:var(--teal);color:#001510;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pbtns{display:flex;gap:8px}
.pbtn{flex:1;padding:10px;border-radius:11px;font-size:12.5px;font-family:var(--font-b);cursor:pointer;transition:.2s;border:1px solid var(--border);font-weight:500}
.pbtn.pri{background:var(--teal);color:#001510;border-color:var(--teal)}
.pbtn.pri:hover{background:var(--teal-d)}
.pbtn.sec{background:transparent;color:var(--muted)}
.pbtn.sec:hover{color:var(--text)}
.hist-modal-ov{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s ease}
.hist-modal-box{background:var(--panel);border:1px solid var(--border);border-radius:20px;width:100%;max-width:420px;max-height:70vh;display:flex;flex-direction:column;animation:up .3s cubic-bezier(.22,1,.36,1)}
.hist-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.hist-modal-body{overflow-y:auto;padding:12px 14px;flex:1}
.hist-modal-body::-webkit-scrollbar{width:3px}
.hist-modal-body::-webkit-scrollbar-thumb{background:rgba(0,201,167,.18);border-radius:4px}
.hist-item{margin:8px 0;border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:rgba(255,255,255,.02)}
.hist-item summary{cursor:pointer;font-weight:600;color:var(--teal);font-size:12px;list-style:none}
.hist-item summary::before{content:'▶ ';font-size:10px}
.hist-item[open] summary::before{content:'▼ '}
@media(max-width:600px){
  body{align-items:flex-end;justify-content:center;padding:0}
  .widget{border-radius:22px 22px 0 0;width:100vw;max-width:100vw;height:93dvh;max-height:93dvh;box-shadow:0 -10px 50px rgba(0,0,0,.65)}
  .hdr{padding:10px 12px}
  .avatar{width:38px;height:38px;border-radius:10px}
  .hdr-name{font-size:13.5px}
  .hdr-status{font-size:10.5px}
  .hbtn{width:30px;height:30px;font-size:13px}
  .msgs{padding:12px 10px;gap:8px}
  .bubble{font-size:13px;padding:9px 12px}
  .chip{font-size:11px;padding:5px 10px}
  .txt{font-size:13px}
  .ibtn,.send{width:40px;height:40px}
  .hint{display:none}
  .agent-bar{font-size:10.5px;padding:5px 12px}
  .wlogo img{height:38px}
  .wsub{font-size:11px}
  .hist-modal-ov{align-items:flex-end;padding:0}
  .hist-modal-box{max-width:100%;max-height:80vh;border-radius:16px 16px 0 0}
  .input-area{padding:10px 10px 18px}
}
@media(min-width:601px) and (max-width:1024px){
  body{align-items:center;justify-content:center;padding:24px}
  .widget{width:min(600px, calc(100vw - 48px));height:min(820px, calc(100vh - 48px));border-radius:28px}
  .hdr{padding:16px 20px}
  .avatar{width:50px;height:50px;border-radius:14px}
  .hdr-name{font-size:16.5px}
  .msgs{padding:20px 18px;gap:12px}
  .bubble{font-size:14.5px;padding:12px 17px;line-height:1.65}
  .chip{font-size:12.5px;padding:7px 14px}
  .txt{font-size:14.5px;padding:11px 16px}
  .ibtn,.send{width:46px;height:46px;font-size:18px}
  .wlogo img{height:52px}
  .agent-bar{font-size:12px;padding:8px 20px}
  .input-area{padding:14px 16px 18px}
}
@media(min-width:1025px){
  body{align-items:center;justify-content:center;padding:32px}
  .widget{width:480px;height:min(780px, calc(100vh - 64px));border-radius:28px}
  .hdr{padding:16px 20px}
  .avatar{width:48px;height:48px;border-radius:13px}
  .msgs{padding:18px 16px;gap:11px}
  .bubble{font-size:14px;padding:11px 15px;line-height:1.62}
  .txt{font-size:14px}
  .ibtn,.send{width:44px;height:44px}
  .wlogo img{height:50px}
  .agent-bar{font-size:12px;padding:8px 20px}
  .input-area{padding:13px 14px 16px}
}
@media(min-width:1440px){
  .widget{width:520px;height:min(840px, calc(100vh - 80px))}
  .bubble{font-size:14.5px}
  .hdr-name{font-size:16px}
}
</style>
</head>
<body>
<div class="bg"></div><div class="grid"></div>
<div class="widget" id="widget">

<!-- HEADER -->
<div class="hdr">

// ══════════════════════════════════════════════
function executeTool(name, input) {
  switch (name) {

    case 'get_plan_details': {
      const key = (input.plan_name||'').toLowerCase().trim();
      let plan = PLANS[key];
      if (!plan) {
        // fuzzy match
        const match = Object.keys(PLANS).find(k => k.includes(key.split(' ').slice(-1)[0]) || key.includes(k.split(' ').slice(-1)[0]));
        plan = match ? PLANS[match] : null;
      }
      if (!plan) return { success:false, error:"Plan not found", available: Object.values(PLANS).map(p=>p.name) };
      return { success:true, plan };
    }

    case 'check_device_compatibility': {
      const d = (input.device||'').toLowerCase();
      const brands5G = ['iphone 12','iphone 13','iphone 14','iphone 15','s21','s22','s23','s24','pixel 6','pixel 7','pixel 8','oneplus 9','oneplus 10','oneplus 11'];
      const compatible = ['iphone','samsung','galaxy','google','pixel','oneplus','motorola','moto','nokia','sony','xiaomi','lg'].some(b => d.includes(b));
      const is5G = brands5G.some(m => d.includes(m));
      return {
        success: true, device: input.device, compatible, fiveG: is5G,
        network: "T-Mobile 5G + 4G LTE",
        message: compatible
          ? `✅ ${input.device} is compatible with Zoiko Mobile! ${is5G ? "It supports 5G — you'll get blazing fast speeds on our T-Mobile network." : "It'll run on our 4G LTE network smoothly."} Bring it over at zoikomobile.com/byod-plans/`
          : `Please ensure your device is unlocked (GSM compatible). Check at zoikomobile.com/byod-plans/ — most unlocked phones work!`,
        check_url: "zoikomobile.com/byod-plans/"
      };
    }

    case 'calculate_family_savings': {
      const lines = Number(input.num_lines) || 2;
      const bill = Number(input.current_monthly_bill) || 0;
      const basePerLine = 25; // Zoiko Core
      const discounted = lines >= 3 ? basePerLine * 0.80 : basePerLine;
      const total = +(discounted * lines).toFixed(2);
      const monthly = bill > 0 ? +(bill - total).toFixed(2) : null;
      const annual = monthly ? +(monthly * 12).toFixed(2) : null;
      return {
        success:true, lines, zoiko_total: total, per_line: +discounted.toFixed(2),
        discount_applied: lines >= 3, discount: lines >= 3 ? "20%" : "0%",
        monthly_savings: monthly, annual_savings: annual,
        recommendation: lines >= 3 ? "Zoiko Core Family Plan" : "Zoiko Core",
        note: lines >= 3 ? `With ${lines} lines you unlock 20% family discount — saving $${+(basePerLine * 0.20 * lines).toFixed(2)}/mo vs individual lines!` : `Add ${3-lines} more line${3-lines>1?'s':''} to unlock our 20% family discount!`
      };
    }

    case 'find_nearest_office': {
      const loc = (input.location||'').toLowerCase();
      const offices = [
        { city:"Austin",      state:"TX", address:"5900 Balcones Dr #24685", zip:"78731", phone:"800-988-8116" },
        { city:"Washington",  state:"DC", address:"1717 N St NW Suite 1",    zip:"20036", phone:"800-988-8116" },
        { city:"Sacramento",  state:"CA", address:"1401 21st St Suite R",    zip:"95811", phone:"800-988-8116" },
        { city:"Springfield", state:"IL", address:"2501 Chatham Rd Suite R", zip:"62704", phone:"847-728-6872" },
        { city:"Dover",       state:"DE", address:"8 The Green Suite A",     zip:"19901", phone:"302-899-7312" },
        { city:"Orlando",     state:"FL", address:"12386 State Rd 535 #302", zip:"32836", phone:"800-988-8116" }
      ];
      const found = offices.find(o => loc.includes(o.city.toLowerCase()) || loc.includes(o.state.toLowerCase()));
      return { success:true, nearest: found||offices[0], all_offices: offices, found_match: !!found };
    }

    case 'get_active_promotions': {
      return {
        success:true,
        promotions:[
          { emoji:"👨‍👩‍👧", title:"Family Saver Deal", desc:"20% OFF when you add 3+ lines. Save up to $25/mo!", badge:"HOT" },
          { emoji:"📲", title:"Free Port-In", desc:"Transfer your number to Zoiko completely free. Keep your existing number!", badge:"ONGOING" },
          { emoji:"⚡", title:"Zero Activation Fees", desc:"No activation fees on any plan — ever. Switch without hidden costs.", badge:"ALWAYS" },
          { emoji:"🎉", title:"First Month 50% Off", desc:"New customers get 50% off their first month on Zoiko Core and above.", badge:"LIMITED" },
          { emoji:"🌍", title:"Free International Calling", desc:"Call 70-200+ countries free depending on your plan — no extra charges.", badge:"ALL PLANS" }
        ]
      };
    }

    case 'create_callback_request': {
      const ref = 'ZKN-' + Date.now().toString().slice(-6);
      setTimeout(() => addEscalateWithData(input.name, input.phone, input.issue, ref), 400);
      return {
        success:true, ticket_id:ref,
        callback_time: input.priority==='urgent' ? "Within 1 hour" : "Within 24 hours",
        message:`Callback request created! Reference: ${ref}. Our team will call ${input.phone} within ${input.priority==='urgent'?'1 hour':'24 hours'}.`
      };
    }

    case 'check_coverage': {
      return {
        success:true, location:input.location,
        coverage_5g:true, coverage_4g:true, quality:"Excellent",
        network:"T-Mobile nationwide",
        international:"200+ countries supported",
        wifi_calling:"Available free on all plans",
        note:`Great news! Zoiko Mobile has excellent 5G and 4G LTE coverage in ${input.location} through T-Mobile's nationwide network.`
      };
    }

    case 'compare_plans': {
      const findPlan = name => {
        const k = name.toLowerCase();
        return PLANS[k] || PLANS[Object.keys(PLANS).find(pk => pk.includes(k.split(' ').pop()))||''] || null;
      };
      const a = findPlan(input.plan_a);
      const b = findPlan(input.plan_b);
      return { success:true, plan_a:a||{name:input.plan_a,error:"not found"}, plan_b:b||{name:input.plan_b,error:"not found"} };
    }

    default:
      return { success:false, error:"Unknown tool: "+name };
  }
}

//Connect Your HTML Chatbot to Backend

async function sendMessage(message) {
  const response = await fetch("http://localhost:8000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message})
  });

  const data = await response.json();
  return data.response;
}

async function handleSend() {
  const input = document.getElementById("userInput");
  const userMessage = input.value;

  const reply = await sendMessage(userMessage);

  console.log("Bot:", reply);   // display in chat UI
}

  // ── Fallback mode (no API key) ──
  if (!API_KEY || API_KEY==='YOUR_API_KEY_HERE') {
    await delay(900+Math.random()*600);
    hideTyping();
    const reply = smartReply(text, chatMsgs);
    chatMsgs.push({ role:'assistant', content:reply });
    streamMsg(reply, ()=>{ if(autoSpeak) speak(reply); });
    sendBtn.disabled=false; typing=false;
    return;
  }

  try {
    // Build conversation context (text only for clean history)
    let messages = chatMsgs.slice(-20);
    let finalReply = null;
    let toolsUsed = [];

    // ── Agentic loop — up to 6 tool-use turns ──
    for (let turn=0; turn<6; turn++) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': API_KEY,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:900,
          system: SYSTEM,
          tools: TOOLS,
          messages
        })
      });

      const data = await res.json();

      if (data.error) {
        if (data.error.type==='authentication_error') {
          hideTyping(); hideToolBar();
          streamMsg('⚠️ Invalid API key. Get yours free at console.anthropic.com');
          sendBtn.disabled=false; typing=false; return;
        }
        throw new Error(data.error.message||'API error');
      }

      const toolUses  = (data.content||[]).filter(b=>b.type==='tool_use');
      const textParts = (data.content||[]).filter(b=>b.type==='text');

      // No tool calls → final answer
      if (toolUses.length===0) {
        finalReply = textParts.map(b=>b.text).join('').trim();
        break;
      }

      // Tool calls detected → execute them
      messages.push({ role:'assistant', content:data.content });
      const toolResults = [];

      for (const tc of toolUses) {
        toolsUsed.push(tc.name);
        showToolBar(rndLabel(tc.name));
        await delay(350); // small pause so user sees the activity bar
        const result = executeTool(tc.name, tc.input);
        toolResults.push({ type:'tool_result', tool_use_id:tc.id, content:JSON.stringify(result) });
      }

      messages.push({ role:'user', content:toolResults });
      showToolBar('💭 Composing response...');
    }

    if (!finalReply) finalReply = smartReply(text);

    hideTyping();
    hideToolBar();
    chatMsgs.push({ role:'assistant', content:finalReply });
    streamMsg(finalReply, ()=>{
      if (autoSpeak) speak(finalReply);
      saveHistory(text, finalReply, toolsUsed);
      if (/frustrated|angry|terrible|worst|useless|speak to (human|agent|person)/i.test(text)) {
        setTimeout(()=>addEscalate(),500);
      }
    });

  } catch(err) {
    hideTyping(); hideToolBar();
    const reply = smartReply(text, chatMsgs);
    chatMsgs.push({ role:'assistant', content:reply });
    streamMsg(reply, ()=>{ if(autoSpeak) speak(reply); });
    console.error('Zoikon error:', err);
  }

  sendBtn.disabled=false; typing=false;
}

// ══════════════════════════════════════════════
//  STREAM BOT MESSAGE (typewriter effect)
// ══════════════════════════════════════════════
function streamMsg(text, callback) {
  msgCount++;
  const wrap = document.createElement('div');
  wrap.className='msg bot';
  const ava = document.createElement('div');
  ava.className='mava'; ava.style.cssText='background:#fff;padding:2px';
  ava.innerHTML='<img src="'+LOGO+'" alt="Z"/>';
  const inner = document.createElement('div');
  inner.style.cssText='display:flex;flex-direction:column;max-width:100%';
  const bbl = document.createElement('div');
  bbl.className='bubble';
  inner.appendChild(bbl);
  wrap.appendChild(ava); wrap.appendChild(inner);
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;

  // Word-by-word typewriter with punctuation pauses
  const words = text.split(' ');
  let i=0, displayed='';
  const cursor = '<span style="display:inline-block;width:2px;height:13px;background:var(--teal);margin-left:2px;border-radius:1px;animation:blink .65s infinite;vertical-align:middle"></span>';

  const tick = ()=>{
    if (i>=words.length) {
      bbl.innerHTML = fmt(text);
      appendReactions(inner, text);
      if (callback) callback();
      msgs.scrollTop=msgs.scrollHeight;
      return;
    }
    displayed += (i>0?' ':'')+words[i];
    bbl.innerHTML = fmt(displayed)+cursor;
    msgs.scrollTop=msgs.scrollHeight;
    i++;
    const prev = words[i-1];
    const pause = (prev.endsWith('.')||prev.endsWith('!')||prev.endsWith('?')||prev.endsWith(':')) ? 85 : 22+Math.random()*16;
    setTimeout(tick, pause);
  };
  tick();
}

function fmt(text){

    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')

// ══════════════════════════════════════════════
//  SMART FALLBACK — Context-aware, memory-driven
//  Reads last bot reply to handle follow-ups like
//  "more details", "tell me more", "what else" etc.
// ══════════════════════════════════════════════
function smartReply(text) {
  const t = text.toLowerCase().trim();

  // ── Get last bot message for context-aware replies ──
  const lastBot = chatMsgs.filter(m=>m.role==='assistant').slice(-1)[0];
  const ctx = lastBot ? lastBot.content.toLowerCase() : '';

  // ── POSITIVE REACTIONS — "nice", "great", "awesome", "cool", "thanks", etc. ──
  if (/^(nice|great|awesome|cool|wow|amazing|perfect|excellent|fantastic|wonderful|lovely|brilliant|superb|sweet|solid|good|ok|okay|alright|sounds good|got it|understood|noted|sure|yep|yup|yes|absolutely|of course|definitely|thanks|thank you|thank u|thx|ty|cheers|appreciate|helpful|love it|love this|that helps|that's helpful)[\s!.]*$/i.test(t)) {
    const positives = [
      "Glad I could help! 😊 Is there anything else about Zoiko Mobile I can help you with — plans, eSIM, family discounts, or anything else?",
      "Happy to help! 🙌 Feel free to ask me anything else — I'm here for you!",
      "That's what I'm here for! 😊 Anything else on your mind? Whether it's plans, activation, or coverage — I've got you covered.",
      "Wonderful! 🌟 Don't hesitate to ask if you have more questions. I'm always here!",
      "Great to hear! 😊 Is there anything specific you'd like to explore — like which plan fits your usage, or how to get started?"
    ];
    return positives[Math.floor(Math.random()*positives.length)];
  }

  // ── NEGATIVE / DISAPPOINTED reactions ──
  if (/^(not good|not helpful|bad|disappointing|useless here|no|nope|nah|not really|not what i needed|that's not|thats not|wrong|incorrect)[\s!.]*$/i.test(t)) {

// ══════════════════════════════════════════════
//  TEXT-TO-SPEECH
// ══════════════════════════════════════════════
function speak(text,btn){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const clean=text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1')
    .replace(/[🤖📱🌍✅🔌👤🎤📞📧🏢🚀✈️🎉⚠️🌟⚡🎮👨‍👩‍👧🇨🇦🇲🇽😊🙋👋💙💳📅🔄⭐🔋🎬📶📡🎧📨🔑📋👍👎💰🏠📲🛡️🔥🎉📊💰📍🗺️🌐⚖️]/gu,'')
    .replace(/<br\/>/g,'. ').replace(/<[^>]+>/g,'');
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='en-US'; u.rate=0.92; u.pitch=1.05; u.volume=1;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>['Samantha','Google US English','Microsoft Aria Online (Natural) - English (United States)','Microsoft Jenny Online (Natural) - English (United States)'].indexOf(v.name)>=0)
    ||voices.find(v=>v.lang==='en-US'&&!v.localService)||voices.find(v=>v.lang==='en-US')||voices[0];
  if(v) u.voice=v;
  vbarWrap.classList.add('on'); vlabel.textContent='Speaking...';
  u.onend=function(){ vbarWrap.classList.remove('on'); if(btn){btn.innerHTML='🔊 Listen';btn.classList.remove('on');} };
  if(btn){ btn.innerHTML='⏹ Stop'; btn.classList.add('on'); btn.onclick=function(){ window.speechSynthesis.cancel(); btn.innerHTML='🔊 Listen'; btn.classList.remove('on'); vbarWrap.classList.remove('on'); }; }
  window.speechSynthesis.speak(u);
}
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged=function(){ window.speechSynthesis.getVoices(); }; }

muteBtn.addEventListener('click',function(){
  autoSpeak=!autoSpeak;
  muteBtn.textContent=autoSpeak?'🔊':'🔇';
  muteBtn.classList.toggle('active',autoSpeak);
  if(!autoSpeak) window.speechSynthesis.cancel();
  toast(autoSpeak?'🔊 Auto-speak on':'🔇 Auto-speak off');
});

// ══════════════════════════════════════════════
//  SPEECH-TO-TEXT
// ══════════════════════════════════════════════
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  recognition=new SR();
  recognition.continuous=false; recognition.interimResults=true; recognition.lang='en-US';
  recognition.onstart=function(){ listening=true; micBtn.classList.add('mic-on'); vbarWrap.classList.add('on'); vlabel.textContent='Listening...'; };
  recognition.onresult=function(e){ txt.value=Array.from(e.results).map(r=>r[0].transcript).join(''); txt.style.height='auto'; txt.style.height=Math.min(txt.scrollHeight,100)+'px'; };
  recognition.onend=function(){ listening=false; micBtn.classList.remove('mic-on'); vbarWrap.classList.remove('on'); if(txt.value.trim()) send(); };
  recognition.onerror=function(e){ listening=false; micBtn.classList.remove('mic-on'); vbarWrap.classList.remove('on'); if(e.error==='network') toast('⚠️ Voice needs internet.'); else if(e.error!=='no-speech') toast('🎤 Mic error: '+e.error); };
}
micBtn.addEventListener('click',async function(){
  if(!SR){ toast('❌ Voice not supported. Use Chrome or Edge.'); return; }
  if(listening){ recognition.stop(); return; }
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=>t.stop());
    window.speechSynthesis.cancel(); recognition.start();
  }catch(err){
    if(err.name==='NotAllowedError') showPermModal();
    else if(err.name==='NotFoundError') toast('❌ No microphone detected.');
    else toast('❌ '+err.message);
  }
});

// ══════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════
function toast(msg){
  const existing=document.querySelector('.toast'); if(existing) existing.remove();
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.animation='tOut .3s ease forwards'; setTimeout(()=>t.remove(),300); },3200);
}
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function showPermModal(){
  const ua=navigator.userAgent;
  const steps=ua.includes('Edg')?['Click 🔒 in address bar','Permissions → Microphone → Allow','Reload page']:
    ua.includes('Firefox')?['Click 🔒 → Connection Secure → More Info','Permissions → remove Microphone block','Reload page']:
    ['Click 🔒 lock icon in address bar','Microphone → Allow','Reload page'];
  const ov=document.createElement('div'); ov.className='perm-ov';
  ov.innerHTML='<div class="perm-box"><div class="perm-ico">🎤</div><div class="perm-ttl">Microphone Blocked</div><div class="perm-desc">Enable microphone access in your browser:</div><div class="perm-steps">'+steps.map((s,i)=>'<div class="pstep"><div class="pnum">'+(i+1)+'</div><div>'+s+'</div></div>').join('')+'</div><div class="pbtns"><button class="pbtn sec" onclick="this.closest(\'.perm-ov\').remove()">Dismiss</button><button class="pbtn pri" onclick="location.reload()">🔄 Reload</button></div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
}

function checkMicPerm(){
  if(!navigator.permissions) return;
  navigator.permissions.query({name:'microphone'}).then(s=>{
    if(s.state==='denied'){ micBtn.style.opacity='.5'; micBtn.style.color='var(--red)'; micBtn.title='Mic blocked — click for fix'; }
    s.onchange=function(){ if(s.state==='granted'){ micBtn.style.opacity='1'; micBtn.style.color=''; } };
  }).catch(()=>{});
}
checkMicPerm();
